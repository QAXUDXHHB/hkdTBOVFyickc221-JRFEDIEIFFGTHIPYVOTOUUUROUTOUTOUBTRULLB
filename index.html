<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC纯C专业清理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 20px;
            background-color: #000;
        }
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        .title {
            position: absolute;
            top: 30px;
            left: 30px;
            font-size: 28px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        .btn-container {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        .action-btn {
            width: 160px;
            height: 80px;
            font-size: 20px;
            border: none;
            border-radius: 0;
            background-color: rgba(0, 255, 0, 0.1);
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .action-btn:hover {
            background-color: rgba(0, 255, 0, 0.25);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.6);
        }
        .notice-box {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 300px;
            border: 2px solid #0f0; /* 绿色边框呼应背景 */
            border-radius: 8px;
            background-color: rgba(0, 0, 0, 0.6);
            color: #0f0; /* 绿色文字 */
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 15px;
            backdrop-filter: blur(3px);
        }

        .notice-title {
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }

        .notice-item {
            font-size: 15px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>
    <div class="title">MC纯C专业清理</div>
    <div class="btn-container">
        <button class="action-btn" onclick="window.open('https://dazzling-fairy-b0078e.netlify.app/SafetyChecker.html', '_blank')">模拟执行</button>
        <button class="action-btn" onclick="window.open('https://Datagglua.com', '_blank')">下载脚本</button>
    </div>
    <div class="notice-box">
        <div class="notice-title">如果手机变砖不属于我们的责任</div>
        <div class="notice-item">·永久变砖-除了你是专业人士</div>
        <div class="notice-item">·即使变砖数据也会消失</div>
    </div>
    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        const chars = ['0', '1'];
        const fontSize = 16;
        const columns = Math.floor(canvas.width / fontSize);
        const drops = Array(columns).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0f0';
            ctx.font = `${fontSize}px monospace`;
            for (let i = 0; i < columns; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(draw, 30);
    </script>
</body>
</html>
